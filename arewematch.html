<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多维缘分测算终端</title>
  
  <!-- 引入 React 和 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel 用于在浏览器中实时编译 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 【核心新增】：引入 html2canvas 库，用于所见即所得的图片渲染 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", STHeiti, "Microsoft YaHei", Tahoma, Simsun, sans-serif !important;
    }

    /* 自定义一些动画 */
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow { animation: spin-slow 4s linear infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen text-slate-800">
  
  <div id="root"></div>

  <!-- 核心逻辑脚本 (JSX) -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // 图标库 (内联 SVG)
    // ==========================================
    const IconHeart = ({ className, fill="none" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
    const IconCompass = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>;
    const IconAlert = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const IconRefresh = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const IconDown = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
    const IconUp = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"/></svg>;
    const IconKey = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>;
    const IconBot = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M12 8v4"/><path d="M8 12h8"/><path d="M8 16h8"/></svg>;
    const IconLoader = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>;
    const IconDownload = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
    const IconSparkles = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
    const IconStar = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;

    // ==========================================
    // 基础数据配置
    // ==========================================
    const MBTI_TYPES = [
      "INTJ", "INTP", "ENTJ", "ENTP",
      "INFJ", "INFP", "ENFJ", "ENFP",
      "ISTJ", "ISFJ", "ESTJ", "ESFJ",
      "ISTP", "ISFP", "ESTP", "ESFP"
    ];

    const ZODIAC_SIGNS = [
      { name: '水瓶座', start: '01-20', end: '02-18', element: '风' },
      { name: '双鱼座', start: '02-19', end: '03-20', element: '水' },
      { name: '白羊座', start: '03-21', end: '04-19', element: '火' },
      { name: '金牛座', start: '04-20', end: '05-20', element: '土' },
      { name: '双子座', start: '05-21', end: '06-20', element: '风' },
      { name: '巨蟹座', start: '06-21', end: '07-22', element: '水' },
      { name: '狮子座', start: '07-23', end: '08-22', element: '火' },
      { name: '处女座', start: '08-23', end: '09-22', element: '土' },
      { name: '天秤座', start: '09-23', end: '10-22', element: '风' },
      { name: '天蝎座', start: '10-23', end: '11-21', element: '水' },
      { name: '射手座', start: '11-22', end: '12-21', element: '火' },
      { name: '摩羯座', start: '12-22', end: '01-19', element: '土' }
    ];

    const CHINESE_ZODIAC = ['猴', '鸡', '狗', '猪', '鼠', '牛', '虎', '兔', '龙', '蛇', '马', '羊'];

    // ==========================================
    // 核心算法 (整合了立春校验)
    // ==========================================
    const getZodiac = (dateString) => {
      if (!dateString) return null;
      const date = new Date(dateString);
      const month = date.getMonth() + 1;
      const day = date.getDate();
      for (let sign of ZODIAC_SIGNS) {
        const [startMonth, startDay] = sign.start.split('-').map(Number);
        const [endMonth, endDay] = sign.end.split('-').map(Number);
        if ((month === startMonth && day >= startDay) || (month === endMonth && day <= endDay)) {
          return sign;
        }
      }
      return ZODIAC_SIGNS[11];
    };

    const calculateZodiacMatch = (z1, z2) => {
      if (!z1 || !z2) return { score: 50, desc: '缺少数据' };
      const e1 = z1.element;
      const e2 = z2.element;
      if (e1 === e2) return { score: 90, desc: `${e1}象与${e2}象：同频共振，非常默契。` };
      if ((e1 === '火' && e2 === '风') || (e1 === '风' && e2 === '火')) return { score: 95, desc: '风助火势：互相激发，充满激情与灵感。' };
      if ((e1 === '土' && e2 === '水') || (e1 === '水' && e2 === '土')) return { score: 95, desc: '水土交融：情感深沉，互相滋养，踏实稳定。' };
      if ((e1 === '水' && e2 === '火') || (e1 === '火' && e2 === '水')) return { score: 60, desc: '水火不容：极具吸引力，但也容易产生剧烈冲突。' };
      if ((e1 === '土' && e2 === '风') || (e1 === '风' && e2 === '土')) return { score: 65, desc: '风尘扬沙：价值观差异较大，需要大量沟通包容。' };
      return { score: 75, desc: '需要互相适应磨合，有成长的空间。' };
    };

    const calculateMBTIMatch = (m1, m2) => {
      if (!m1 || !m2) return { score: 50, desc: '缺少数据' };
      if (m1 === m2) return { score: 75, desc: '高度相似，懂彼此的想法，但可能缺乏互补带来的新鲜感。' };
      let matchScore = 50;
      let matches = 0;
      for (let i = 0; i < 4; i++) { if (m1[i] === m2[i]) matches++; }
      const isGolden = (m1 === 'ENTP' && m2 === 'INFJ') || (m1 === 'INFJ' && m2 === 'ENTP') ||
                       (m1 === 'ENFP' && m2 === 'INTJ') || (m1 === 'INTJ' && m2 === 'ENFP');
      if (isGolden) return { score: 98, desc: '理论上的“天作之合”，完美互补，灵魂伴侣。' };
      if (m1[1] !== m2[1]) matchScore -= 10;
      else matchScore += 20;
      if (matches === 3) return { score: 85, desc: '大方向一致，小差异带来情趣，非常棒的组合。' };
      if (matches === 2) return { score: 70, desc: '存在差异，但可以互补，需要接纳对方不同的视角。' };
      if (matches === 0) return { score: 60, desc: '完全相反的性格，极具致命吸引力，但也极具挑战性。' };
      return { score: matchScore + 15, desc: '各有千秋，需要在差异中寻找平衡。' };
    };

    const getLichunDay = (year) => {
      if (year < 1900 || year > 2100) return 4;
      const Y = year % 100;
      const D = 0.2422;
      const L = Math.floor(Y / 4);
      const C = year < 2000 ? 4.6295 : 3.87; 
      return Math.floor(Y * D + C) - L;
    };

    const getChineseZodiac = (dateString) => {
      if (!dateString) return null;
      const date = new Date(dateString);
      let year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const lichunDay = getLichunDay(year);
      if (month === 1 || (month === 2 && day < lichunDay)) { year -= 1; }
      const index = ((year % 12) + 12) % 12;
      return { animal: CHINESE_ZODIAC[index], index: index };
    };

    const calculateBaziMatch = (bz1, bz2) => {
      if (!bz1 || !bz2) return { score: 50, desc: '缺少数据' };
      const diff = Math.abs(bz1.index - bz2.index);
      const liuhe = [[4, 5], [6, 3], [7, 2], [8, 1], [9, 0], [10, 11]];
      const isLiuhe = liuhe.some(pair => (pair.includes(bz1.index) && pair.includes(bz2.index)));
      if (diff === 6) return { score: 40, desc: '属相六冲，气场容易发生碰撞，需要更多的包容和理解。' };
      if (isLiuhe) return { score: 96, desc: '生肖六合，天赐良缘，气场互相吸引且极其融洽。' };
      if (diff === 4 || diff === 8) return { score: 88, desc: '生肖三合，步调一致，是极佳的合作伙伴和伴侣。' };
      return { score: 72, desc: '生肖相平，无克无合，平平淡淡才是真。' };
    };

    const calculateNameHash = (name1, name2) => {
      if (!name1 || !name2) return 50;
      const combined = [name1, name2].sort().join('');
      let hash = 0;
      for (let i = 0; i < combined.length; i++) {
        hash = ((hash << 5) - hash) + combined.charCodeAt(i);
        hash |= 0; 
      }
      return 60 + (Math.abs(hash) % 40);
    };

    // ==========================================
    // 主应用组件
    // ==========================================
    function App() {
      const [person1, setPerson1] = useState({ name: '', dob: '', mbti: '' });
      const [person2, setPerson2] = useState({ name: '', dob: '', mbti: '' });
      const [result, setResult] = useState(null);
      const [isCalculating, setIsCalculating] = useState(false);
      const [showDetails, setShowDetails] = useState(false);
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('deepseek_api_key') || '');
      const [aiResult, setAiResult] = useState(null);
      const [isAiLoading, setIsAiLoading] = useState(false);
      const [aiError, setAiError] = useState(null);
      
      const [isExporting, setIsExporting] = useState(false);

      useEffect(() => {
        localStorage.setItem('deepseek_api_key', apiKey);
      }, [apiKey]);

      const fetchAiAnalysis = async (calcResult) => {
        setIsAiLoading(true);
        setAiError(null);
        try {
          const prompt = `请作为一位精通心理学、占星学和东方命理学的关系专家，为以下两人进行深入的缘分和关系分析：
对象A：${person1.name}，出生日期：${person1.dob}（${calcResult.zodiac.p1.name}，属${calcResult.bazi.p1.animal}），MBTI：${person1.mbti}。
对象B：${person2.name}，出生日期：${person2.dob}（${calcResult.zodiac.p2.name}，属${calcResult.bazi.p2.animal}），MBTI：${person2.mbti}。
综合匹配度为：${calcResult.finalScore}%。
请结合MBTI认知差异、星座互动、生肖气场，给出一份深度分析报告。排版要求：
1. 请使用小标题（如 ### 核心优势）组织段落。
2. 重点词汇请使用 **加粗** 标记。
3. 语气客观、专业带有玄学感。`;

          const response = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: 'deepseek-chat',
              messages: [{ role: 'user', content: prompt }],
              temperature: 0.7,
              // 【核心修复】：大幅提高 max_tokens，防止大模型文本截断导致 Markdown 错乱
              max_tokens: 2000 
            })
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error?.message || `API 请求失败: ${response.status}`);
          }

          const data = await response.json();
          setAiResult(data.choices[0].message.content);
        } catch (err) {
          setAiError(err.message || '获取 AI 分析时出错，请检查网络或 API Key。');
        } finally {
          setIsAiLoading(false);
        }
      };

      const handleCalculate = () => {
        if (!person1.name || !person1.dob || !person1.mbti || !person2.name || !person2.dob || !person2.mbti) {
          alert("请作为严谨的研究者填满所有实验数据！");
          return;
        }

        setIsCalculating(true);
        setResult(null);
        setAiResult(null);
        setAiError(null);

        setTimeout(() => {
          const z1 = getZodiac(person1.dob);
          const z2 = getZodiac(person2.dob);
          const zodiacResult = calculateZodiacMatch(z1, z2);
          const mbtiResult = calculateMBTIMatch(person1.mbti, person2.mbti);
          const bz1 = getChineseZodiac(person1.dob);
          const bz2 = getChineseZodiac(person2.dob);
          const baziResult = calculateBaziMatch(bz1, bz2);
          const nameScore = calculateNameHash(person1.name, person2.name);

          const finalScore = Math.round((zodiacResult.score * 0.25) + (mbtiResult.score * 0.35) + (baziResult.score * 0.25) + (nameScore * 0.15));

          const newResult = {
            finalScore,
            zodiac: { p1: z1, p2: z2, ...zodiacResult },
            mbti: { p1: person1.mbti, p2: person2.mbti, ...mbtiResult },
            bazi: { p1: bz1, p2: bz2, ...baziResult },
            nameScore
          };

          setResult(newResult);
          setIsCalculating(false);

          if (apiKey) fetchAiAnalysis(newResult);
        }, 1500);
      };

      // 【核心修复】：更强大的 Markdown 正则解析器
      const renderMarkdown = (text) => {
        if (!text) return null;
        return text.split('\n').map((line, index) => {
          const trimmed = line.trim();
          if (trimmed === '') return <div key={index} className="h-2"></div>;

          // 动态捕获 1-6 级的所有标题 (如 #, ##, ###, ####...)
          const headerMatch = trimmed.match(/^(#{1,6})\s+(.*)/);
          if (headerMatch) {
            const level = headerMatch[1].length;
            const content = parseBold(headerMatch[2]);
            if (level === 1) return <h2 key={index} className="text-2xl font-black mt-8 mb-4 text-indigo-900">{content}</h2>;
            if (level === 2) return <h3 key={index} className="text-xl font-bold mt-8 mb-3 text-indigo-900">{content}</h3>;
            if (level === 3) return <h4 key={index} className="text-lg font-bold mt-6 mb-2 text-indigo-800">{content}</h4>;
            return <h5 key={index} className="text-base font-bold mt-4 mb-2 text-indigo-700">{content}</h5>; // 涵盖4、5、6级
          }
          
          if (trimmed.match(/^[-*_]{3,}$/)) return <hr key={index} className="my-6 border-indigo-100" />;
          return <div key={index} className="mb-2 leading-relaxed text-slate-700">{parseBold(trimmed)}</div>;
        });
      };

      const parseBold = (text) => {
        // 清理由于 Token 截断导致结尾残留的单独 ** 符号
        const cleanText = text.replace(/\*\*\s*$/, '');
        const parts = cleanText.split(/(\*\*.*?\*\*)/g);
        return parts.map((part, i) => {
          if (part.startsWith('**') && part.endsWith('**')) {
            return <strong key={i} className="font-bold text-indigo-700">{part.slice(2, -2)}</strong>;
          }
          return part;
        });
      };

      const handleExportImage = () => {
        if (isExporting) return;
        
        setShowDetails(true);
        setIsExporting(true);
        
        setTimeout(() => {
          const reportElement = document.getElementById('report-container');
          
          if (window.html2canvas && reportElement) {
            window.html2canvas(reportElement, {
              scale: 2, 
              useCORS: true,
              backgroundColor: '#ffffff'
            }).then(canvas => {
              const imgData = canvas.toDataURL('image/png');
              const link = document.createElement('a');
              link.download = `多维缘分报告_${person1.name}_${person2.name}.png`;
              link.href = imgData;
              link.click();
              
              setIsExporting(false);
            }).catch(err => {
              console.error('截图失败:', err);
              alert("渲染图片失败，请检查浏览器设置。");
              setIsExporting(false);
            });
          } else {
            alert("渲染引擎尚未加载完毕，请稍后再试。");
            setIsExporting(false);
          }
        }, 500); 
      };

      const getScoreColor = (score) => {
        if (score >= 90) return 'text-rose-500';
        if (score >= 75) return 'text-orange-500';
        if (score >= 60) return 'text-yellow-600';
        return 'text-slate-500';
      };

      const getScoreMessage = (score) => {
        if (score >= 90) return "灵魂伴侣，天作之合！";
        if (score >= 80) return "非常般配，未来可期！";
        if (score >= 70) return "不错的组合，需要一点磨合。";
        if (score >= 60) return "充满挑战，但也充满惊喜。";
        return "爱能克服一切玄学障碍！";
      };

      return (
        <div className="p-4 md:p-8 max-w-4xl mx-auto space-y-8">
          {/* Header */}
          <div className="text-center space-y-2">
            <div className="inline-flex items-center justify-center p-3 bg-white rounded-full shadow-sm mb-4">
              <IconCompass className="w-8 h-8 text-indigo-500 animate-spin-slow" />
            </div>
            <h1 className="text-3xl md:text-4xl font-bold tracking-tight text-slate-900">多维缘分测算终端</h1>
            <p className="text-slate-500 max-w-lg mx-auto flex items-center justify-center gap-1 text-sm">
              <IconAlert className="w-4 h-4" />
              基于 MBTI 理论、占星四象与严谨地支排盘的交叉分析算法
            </p>
          </div>

          {/* Input Cards */}
          <div className="grid md:grid-cols-2 gap-6">
            {/* Person 1 */}
            <div className="bg-white/80 backdrop-blur-sm p-6 rounded-2xl shadow-xl border border-white/50">
              <h2 className="text-xl font-semibold mb-4 flex items-center gap-2 text-indigo-700">
                <span className="bg-indigo-100 p-1.5 rounded-lg">A</span> 观测对象一
              </h2>
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-slate-600 mb-1">姓名 / 昵称</label>
                  <input type="text" value={person1.name} onChange={e => setPerson1({...person1, name: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="如: 张三" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-600 mb-1">出生日期</label>
                  <input type="date" value={person1.dob} onChange={e => setPerson1({...person1, dob: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-600 mb-1">MBTI 人格</label>
                  <select value={person1.mbti} onChange={e => setPerson1({...person1, mbti: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                    <option value="">请选择...</option>
                    {MBTI_TYPES.map(type => <option key={type} value={type}>{type}</option>)}
                  </select>
                </div>
              </div>
            </div>

            {/* Person 2 */}
            <div className="bg-white/80 backdrop-blur-sm p-6 rounded-2xl shadow-xl border border-white/50">
              <h2 className="text-xl font-semibold mb-4 flex items-center gap-2 text-pink-700">
                <span className="bg-pink-100 p-1.5 rounded-lg">B</span> 观测对象二
              </h2>
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-slate-600 mb-1">姓名 / 昵称</label>
                  <input type="text" value={person2.name} onChange={e => setPerson2({...person2, name: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-pink-500 outline-none" placeholder="如: 李四" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-600 mb-1">出生日期</label>
                  <input type="date" value={person2.dob} onChange={e => setPerson2({...person2, dob: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-pink-500 outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-600 mb-1">MBTI 人格</label>
                  <select value={person2.mbti} onChange={e => setPerson2({...person2, mbti: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-pink-500 outline-none bg-white">
                    <option value="">请选择...</option>
                    {MBTI_TYPES.map(type => <option key={type} value={type}>{type}</option>)}
                  </select>
                </div>
              </div>
            </div>
          </div>

          {/* AI Config */}
          <div className="bg-white/80 backdrop-blur-sm p-5 rounded-2xl shadow-md border border-indigo-100 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="bg-indigo-100 p-2 rounded-full"><IconBot className="w-5 h-5 text-indigo-600" /></div>
              <div>
                <h3 className="font-semibold text-slate-800 text-sm">DeepSeek 深度分析 (可选)</h3>
                <p className="text-xs text-slate-500">输入 API Key，大模型将根据多维数据为您生成定制化关系洞察报告。</p>
              </div>
            </div>
            <div className="w-full md:w-auto flex-1 max-w-sm relative">
              <IconKey className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
              <input type="password" placeholder="输入 DeepSeek API Key (sk-...)" value={apiKey} onChange={(e) => setApiKey(e.target.value)} className="w-full pl-9 pr-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 text-sm outline-none" />
            </div>
          </div>

          {/* Calculate Button */}
          <div className="flex justify-center">
            <button onClick={handleCalculate} disabled={isCalculating} className={`relative overflow-hidden group px-8 py-4 rounded-full font-bold text-white text-lg shadow-lg transition-all duration-300 ${isCalculating ? 'bg-slate-400 cursor-not-allowed' : 'bg-gradient-to-r from-indigo-500 to-pink-500 hover:shadow-pink-500/30 hover:scale-105 active:scale-95'}`}>
              {isCalculating ? (
                <span className="flex items-center gap-2"><IconRefresh className="w-5 h-5 animate-spin" />正在推演时空数据...</span>
              ) : (
                <span className="flex items-center gap-2"><IconHeart className="w-5 h-5" fill="currentColor" />启动匹配算法</span>
              )}
            </button>
          </div>

          {/* Results - 增加了 id="report-container" 以便截图库精准截取 */}
          {result && (
            <div id="report-container" className="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
              
              <div className="bg-gradient-to-br from-slate-900 to-indigo-900 text-white p-8 text-center relative">
                <IconSparkles className="absolute top-4 left-4 text-yellow-400/30 w-12 h-12" />
                <IconStar className="absolute bottom-4 right-4 text-pink-400/30 w-16 h-16" />
                
                {/* 截图时隐藏这个保存按钮 */}
                {!isExporting && (
                  <div className="absolute top-4 right-4">
                    <button onClick={handleExportImage} className="flex items-center gap-2 px-4 py-2 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full text-white text-sm font-medium transition-colors border border-white/20">
                      <IconDownload className="w-4 h-4" />生成长图
                    </button>
                  </div>
                )}

                <p className="text-indigo-200 font-medium mb-2 tracking-widest text-sm uppercase">综合匹配指数</p>
                <div className="flex items-center justify-center gap-4">
                  <div className="text-2xl font-light text-slate-300">{person1.name}</div>
                  
                  <div className={`text-6xl font-black ${isExporting ? 'text-yellow-400 drop-shadow-md' : 'bg-clip-text text-transparent bg-gradient-to-r from-pink-400 to-yellow-300'}`}>
                    {result.finalScore}%
                  </div>
                  
                  <div className="text-2xl font-light text-slate-300">{person2.name}</div>
                </div>
                <p className="mt-4 text-xl font-medium text-pink-100">"{getScoreMessage(result.finalScore)}"</p>
              </div>

              <div className="p-6">
                {!isExporting && (
                  <button onClick={() => setShowDetails(!showDetails)} className="w-full flex items-center justify-between p-4 bg-slate-50 rounded-2xl text-slate-700 hover:bg-slate-100 transition-colors">
                    <span className="font-semibold text-lg flex items-center gap-2"><IconCompass className="w-5 h-5" />查看维度分析报告</span>
                    {showDetails ? <IconUp className="w-5 h-5" /> : <IconDown className="w-5 h-5" />}
                  </button>
                )}

                {(showDetails || isExporting) && (
                  <div className="mt-4 grid gap-4">
                    {/* 【核心修复位置】：加入了 flex flex-col items-center justify-center，并为 span 增加 leading-none 防止基线偏移 */}
                    <div className="p-5 rounded-2xl border border-slate-100 bg-white shadow-sm flex flex-col md:flex-row gap-4 items-center">
                      <div className="w-20 h-20 rounded-full bg-blue-50 flex flex-col items-center justify-center flex-shrink-0">
                        <span className={`text-2xl font-black leading-none ${getScoreColor(result.mbti.score)}`}>{result.mbti.score}</span>
                      </div>
                      <div className="flex-1 text-center md:text-left">
                        <h3 className="font-bold text-slate-800">心理学维度 (MBTI) <span className="text-xs px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full ml-2">权重 35%</span></h3>
                        <p className="text-sm text-slate-500 mt-1"><span className="font-semibold text-indigo-600">{result.mbti.p1}</span> 与 <span className="font-semibold text-pink-600">{result.mbti.p2}</span></p>
                        <p className="text-slate-600 mt-2">{result.mbti.desc}</p>
                      </div>
                    </div>
                    <div className="p-5 rounded-2xl border border-slate-100 bg-white shadow-sm flex flex-col md:flex-row gap-4 items-center">
                      <div className="w-20 h-20 rounded-full bg-purple-50 flex flex-col items-center justify-center flex-shrink-0">
                        <span className={`text-2xl font-black leading-none ${getScoreColor(result.zodiac.score)}`}>{result.zodiac.score}</span>
                      </div>
                      <div className="flex-1 text-center md:text-left">
                        <h3 className="font-bold text-slate-800">占星学维度 (四象星座) <span className="text-xs px-2 py-0.5 bg-purple-100 text-purple-700 rounded-full ml-2">权重 25%</span></h3>
                        <p className="text-sm text-slate-500 mt-1"><span className="font-semibold text-indigo-600">{result.zodiac.p1.name}</span> 与 <span className="font-semibold text-pink-600">{result.zodiac.p2.name}</span></p>
                        <p className="text-slate-600 mt-2">{result.zodiac.desc}</p>
                      </div>
                    </div>
                    <div className="p-5 rounded-2xl border border-slate-100 bg-white shadow-sm flex flex-col md:flex-row gap-4 items-center">
                      <div className="w-20 h-20 rounded-full bg-red-50 flex flex-col items-center justify-center flex-shrink-0">
                        <span className={`text-2xl font-black leading-none ${getScoreColor(result.bazi.score)}`}>{result.bazi.score}</span>
                      </div>
                      <div className="flex-1 text-center md:text-left">
                        <h3 className="font-bold text-slate-800">东方玄学 (严谨地支) <span className="text-xs px-2 py-0.5 bg-red-100 text-red-700 rounded-full ml-2">权重 25%</span></h3>
                        <p className="text-sm text-slate-500 mt-1">属相 <span className="font-semibold text-indigo-600">{result.bazi.p1.animal}</span> 与 属相 <span className="font-semibold text-pink-600">{result.bazi.p2.animal}</span></p>
                        <p className="text-slate-600 mt-2">{result.bazi.desc}</p>
                      </div>
                    </div>
                  </div>
                )}
              </div>
              
              {(isAiLoading || aiResult || aiError) && (
                <div className="p-6 border-t border-slate-100 bg-indigo-50/50">
                  <div className="flex items-center gap-2 mb-4">
                    <IconBot className="w-6 h-6 text-indigo-600" />
                    <h3 className="text-lg font-bold text-slate-800">DeepSeek 深度洞察</h3>
                  </div>
                  <div className="bg-white p-5 rounded-2xl shadow-sm border border-indigo-100/50">
                    {isAiLoading && (
                      <div className="flex flex-col items-center justify-center py-8 space-y-3 text-indigo-500">
                        <IconLoader className="w-8 h-8 animate-spin" />
                        <p className="text-sm font-medium animate-pulse">正在推演量子命理关系...</p>
                      </div>
                    )}
                    {aiError && <div className="p-4 bg-red-50 text-red-600 rounded-xl text-sm">{aiError}</div>}
                    {aiResult && !isAiLoading && <div className="text-slate-800">{renderMarkdown(aiResult)}</div>}
                  </div>
                </div>
              )}
              
              <div className="p-4 bg-slate-50 text-center text-xs text-slate-400 border-t border-slate-100">
                * 研究者注：算法仅供娱乐。立春点采用百年历法回归年测算公式 (Y×D+C-L)。
              </div>
            </div>
          )}
        </div>
      );
    }

    // 挂载 React 应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
